# Mainnet runtime profile (INI-style; loaded by ConfigParser despite .toml extension).
# Copy to ~/.berzcoin/berzcoin.conf and edit for your deployment.

[main]
network = mainnet

# Storage
datadir = ~/.berzcoin

# P2P
bind = 0.0.0.0
port = 8333
maxconnections = 125
maxoutbound = 8

# Discovery
bootstrap_enabled = true
bootstrap_file = bootstrap_nodes.json
dnsseed = false
# comma-separated hostnames when dnsseed=true
dnsseeds = seed1.berzcoin.org,seed2.berzcoin.org,seed3.berzcoin.org,dnsseed.berzcoin.org
addnode =
connect =

# RPC
rpcbind = 127.0.0.1
rpcport = 8332
rpcallowip = 127.0.0.1
rpcthreads = 4
rpcworkqueue = 16
rpctimeout = 30
rpc_require_auth = true

# Wallet
wallet = default
disablewallet = false
wallet_private_key =

# Mining
mining = false
autominer = false
miningaddress =
mining_threads = 1

# Services
webdashboard = false
webhost = 127.0.0.1
webport = 8080
