# Mainnet runtime profile (INI-style; loaded by ConfigParser despite .toml extension).
# Copy to ~/.berzcoin/berzcoin.conf and edit for your deployment.

[main]
network = mainnet

# Storage
datadir = ~/.berzcoin

# P2P
bind = 0.0.0.0
port = 8333
maxconnections = 125
maxoutbound = 8

# Discovery
bootstrap_enabled = true
bootstrap_file = bootstrap_nodes.json
allow_missing_bootstrap = false
dnsseed = true
# comma-separated hostnames when dnsseed=true
# Replace these placeholders with your real seed fleet before production.
dnsseeds = seed-mainnet-1.berzcoin.net,seed-mainnet-2.berzcoin.net,seed-mainnet-3.berzcoin.net
addnode =
connect =
network_hardening = false

# RPC
rpcbind = 127.0.0.1
rpcport = 8332
rpcallowip = 127.0.0.1
rpcthreads = 4
rpcworkqueue = 16
rpctimeout = 30
rpc_require_auth = true

# Consensus activation pins (must match rollout runbook on all nodes)
activation_height_berz_softfork_bip34_strict = 180000
activation_height_berz_hardfork_tx_v2 = 180100
node_consensus_version = 2
enforce_hardfork_guardrails = true

# Wallet
wallet = default
disablewallet = false
wallet_private_key =

# Mining
mining = false
autominer = false
miningaddress =
mining_threads = 1

# Services
webdashboard = false
webhost = 127.0.0.1
webport = 8080
