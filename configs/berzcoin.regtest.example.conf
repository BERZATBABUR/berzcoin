# BerzCoin — example regtest profile (INI; load with: berzcoind -conf /path/to/this/file)
# Copy to ~/.berzcoin/berzcoin.conf and edit paths / secrets.
#
# Copy command (adjust user):
#   cp configs/berzcoin.regtest.example.conf ~/.berzcoin/berzcoin.conf

[main]
# Chain
network = regtest
datadir = ~/.berzcoin

# Wallet (private-key activation model; no wallet passphrase)
wallet = default

# Set true to run without wallet features
disablewallet = false

# P2P (Bitcoin-style regtest defaults)
bind = 127.0.0.1
port = 18444

# JSON-RPC (use same port in berzcoin-cli -rpcport when not using defaults)
rpcbind = 127.0.0.1
rpcport = 18443
rpcallowip = 127.0.0.1

# CPU mining — leave off until you have a real bcrt1 address (getnewaddress + setminingaddress),
# or autostart will fail with "No mining address provided".
mining = false
miningaddress =
autominer = false
mining_threads = 1

# Web dashboard (same process as the node)
webdashboard = true
webhost = 127.0.0.1
webport = 8080

debug = true
logfile = debug.log
