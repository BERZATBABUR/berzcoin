# Mainnet seed profile (INI-compatible and directly loadable by berzcoind).
# Copy to ~/.berzcoin/berzcoin.conf and replace example hosts with real seeds.

[main]
network = mainnet
bind = 0.0.0.0
port = 8333

bootstrap_enabled = true
bootstrap_file = bootstrap_nodes.json
allow_missing_bootstrap = false

# Enable only when these hostnames are real and reachable.
dnsseed = true
dnsseeds = seed1.yourdomain.org,seed2.yourdomain.org,seed3.yourdomain.org

# Optional static peers.
addnode =
connect =

# Optional references for operator tooling (not runtime-loaded by the node yet).
checkpoints_file = genesis/mainnet_checkpoints.json
genesis_file = genesis/mainnet_genesis.json
