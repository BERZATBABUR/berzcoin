name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Run flake8
        run: flake8 node/ shared/ cli/ --max-line-length=120 --ignore=E203,W503,E501
        continue-on-error: true

      - name: Run black
        run: black --check node/ shared/ cli/
        continue-on-error: true
